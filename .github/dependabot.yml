version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - enhancement
      - dependency-management
    commit-message:
      prefix: "chore"
    reviewers:
      - nexus-module/devops-ia

  - package-ecosystem: terraform
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - enhancement
      - dependency-management
    commit-message:
      prefix: "fix"
    reviewers:
      - nexus-module/devops-ia
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: terraform
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - enhancement
      - dependency-management
    commit-message:
      prefix: "feat"
    reviewers:
      - nexus-module/devops-ia
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
