version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - enhancement
      - dependency-management
    commit-message:
      prefix: "chore"
    reviewers:
      - nexus-module/devops-ia

  - package-ecosystem: terraform
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    labels:
      - enhancement
      - dependency-management
    commit-message:
      prefix: "fix"
    reviewers:
      - nexus-module/devops-ia
    groups:
      terraform-minor-patch:
        update-types:
          - "minor"
          - "patch"
      terraform-major:
        update-types:
          - "major"
